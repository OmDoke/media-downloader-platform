server.port=8080
spring.application.name=video-downloader

# yt-dlp path (if not on PATH, set absolute path)
ytdlp.path=yt-dlp
ffmpeg.path=ffmpeg

# Max download size (safety limit)
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# Logging
logging.level.com.videodownloader=DEBUG

# Disable async request timeout for long downloads
spring.mvc.async.request-timeout=-1
